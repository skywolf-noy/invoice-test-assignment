name: CI

on:
  push:
    branches:
      - main
      - feature/production-polish
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Build backend services
        run: docker compose build postgres backend

      - name: Start backend services
        run: docker compose up -d postgres backend

      - name: Show Docker service status
        run: docker compose ps

      - name: Wait for backend to be ready
        run: |
          for attempt in {1..30}; do
            if docker compose exec -T backend php artisan --version; then
              echo "Backend is ready"
              exit 0
            fi

            echo "Waiting for backend... attempt ${attempt}/30"
            sleep 2
          done

          echo "Backend did not become ready in time"
          docker compose logs backend
          exit 1

      - name: Run backend tests
        run: docker compose exec -T backend php artisan test

      - name: Print Docker logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop Docker services
        if: always()
        run: docker compose down -v

  frontend-tests:
    name: Frontend tests and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build
